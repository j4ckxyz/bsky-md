when:
  - event: ["push"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - docker

steps:
  - name: Build and push to Docker Hub
    command: |
      echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag j4ckxyz/bsky-md:latest \
        --push \
        .
