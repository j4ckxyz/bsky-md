when:
  - event: ["push"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - kaniko

steps:
  - name: Build and push to Docker Hub
    command: |
      mkdir -p /root/.docker
      printf '{"auths":{"https://index.docker.io/v1/":{"username":"%s","password":"%s"}}}' \
        "$DOCKER_USERNAME" "$DOCKER_TOKEN" > /root/.docker/config.json

      executor \
        --dockerfile=/tangled/workspace/Dockerfile \
        --destination=docker.io/j4ckxyz/bsky-md:latest \
        --context=dir:///tangled/workspace
