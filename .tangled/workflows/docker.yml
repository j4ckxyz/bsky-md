when:
  - event: ["push"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - kaniko

steps:
  - name: Build and push to Docker Hub
    command: |
      mkdir -p /root/.docker
      AUTH=$(printf '%s:%s' "$DOCKER_USERNAME" "$DOCKER_TOKEN" | base64 -w0)
      printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$AUTH" > /root/.docker/config.json

      executor \
        --dockerfile=/tangled/workspace/Dockerfile \
        --destination=docker.io/j4ckxyz/bsky-md:latest \
        --context=dir:///tangled/workspace
